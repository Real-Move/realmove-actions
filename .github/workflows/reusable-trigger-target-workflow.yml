name: Reusable • Trigger target workflow

on:
  workflow_call:
    inputs:
      repo_owner:
        description: "Owner of the target repository"
        required: false
        type: string
        default: "Real-Move"
      repo_name:
        description: "Name of the target repository"
        required: true
        type: string
      event_type:
        description: "repository_dispatch event_type sent to target repository"
        required: true
        type: string
      branch_name:
        description: "Branch name to forward in client_payload; defaults to current ref name"
        required: false
        type: string
    secrets:
      TRIGGER_TARGET_PAT:
        required: true

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Workflow in Another Repository
        env:
          REPO_OWNER: ${{ inputs.repo_owner }}
          REPO_NAME: ${{ inputs.repo_name }}
          EVENT_TYPE: ${{ inputs.event_type }}
          INPUT_BRANCH_NAME: ${{ inputs.branch_name }}
          DEFAULT_BRANCH_NAME: ${{ github.ref_name }}
          TRIGGER_TARGET_PAT: ${{ secrets.TRIGGER_TARGET_PAT }}
        run: |
          set -euo pipefail

          branch_name="${INPUT_BRANCH_NAME:-$DEFAULT_BRANCH_NAME}"

          curl -sS -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TRIGGER_TARGET_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches" \
            -d "{\"event_type\":\"${EVENT_TYPE}\",\"client_payload\":{\"branch_name\":\"${branch_name}\"}}"
